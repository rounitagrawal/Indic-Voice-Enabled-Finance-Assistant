name: CI

on:
  push:
    branches: [ main, develop , Production-restructure]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (flake8)
        run: |
          flake8 src/ tests/ main.py \
            --max-line-length=100 \
            --exclude=__pycache__,.venv

      - name: Check formatting (black)
        run: |
          black --check --diff src/ tests/ main.py

      - name: Check import ordering (isort)
        run: |
          isort --check-only src/ tests/ main.py

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          # Dummy values — tests mock all external calls
          GEMINI_API_KEY: dummy-key-for-ci
          ULCA_API_KEY: dummy-key-for-ci
          ULCA_USER_ID: dummy-uid-for-ci
          ULCA_AUTHORIZATION: dummy-auth-for-ci
          APP_ENV: development
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Build Docker image
        run: |
          docker build --target runtime -t indic-finance-assistant:ci .
